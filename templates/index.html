<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ask AI Travel Guide</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1e3a8a, #3b82f6, #60a5fa);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.chat-container {
  width: 100%;
  max-width: 480px;
  height: 90vh;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.15);
  border-radius: 25px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.3);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.header {
  padding: 18px;
  color: white;
  font-weight: bold;
  text-align: center;
  font-size: 18px;
}

.chat-box {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.message {
  max-width: 75%;
  padding: 12px 15px;
  border-radius: 18px;
  font-size: 15px;
  animation: fadeIn 1.6s ease;
  line-height: 1.6;
}
.message b {
  display: block;
  margin-top: 10px;
  font-size: 15px;
  font-weight: 600;
}

.user {
  align-self: flex-end;
  background: #2563eb;
  color: white;
}

.bot {
  align-self: flex-start;
  background: rgba(255,255,255,0.9);
}

/* typing dots */
.typing {
  display: flex;
  gap: 5px;
}

.typing span {
  width: 8px;
  height: 8px;
  background: #2563eb;
  border-radius: 50%;
  animation: bounce 1.4s infinite;
}

.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
  0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
  40% { transform: translateY(-6px); opacity: 1; }
}

/* image card */
.image-card {
  width: 220px;
  border-radius: 14px;
  overflow: hidden;
  background: white;
  box-shadow: 0 8px 20px rgba(0,0,0,0.15);
}

.image-card img {
  width: 100%;
  display: block;
}

.card-body {
  padding: 10px;
  font-size: 13px;
}

.card-body a {
  color: #2563eb;
  text-decoration: none;
}

.input-container {
  display: flex;
  padding: 10px;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

button {
  margin-left: 10px;
  padding: 10px 15px;
  border-radius: 10px;
  border: none;
  background: #2563eb;
  color: white;
  cursor: pointer;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(5px);}
  to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="chat-container">
  <div class="header">🌍 AI Travel Guide ✈️</div>

  <div class="chat-box" id="chatBox">
    <div class="message bot">
      Hello! I'm your AI travel guide 😊<br>
      Where would you like to explore today?
    </div>
  </div>

  <div class="input-container">
    <input id="userInput" placeholder="Ask about travel..." />
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>

const chatBox = document.getElementById("chatBox");

// typing effect (word by word)
function streamText(element, text) {
  element.innerHTML = "";
  const words = text.split(" ");
  let i = 0;

  function typing() {
    if (i < words.length) {
      let word = words[i];

      // 🔥 จัด format
      word = word
        .replace(/\n/g, "<br>")
        .replace(/\*\*(.*?)\*\*/g, "<b>$1</b>"); // ทำ bold

      element.innerHTML += word + " ";
      chatBox.scrollTop = chatBox.scrollHeight;

      i++;
      setTimeout(typing, 60);
    }
  }

  typing();
}

// helper
function extractPlace(text) {
  return text.split(" ").slice(0, 2).join(" ");
}

function getImage(place) {
  return `https://source.unsplash.com/featured/?${place},travel`;
}

function getMapLink(place) {
  return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(place)}`;
}

// MAIN FUNCTION
async function sendMessage() {
  const input = document.getElementById("userInput");
  const message = input.value.trim();
  if (!message) return;

  // user msg
  const userMsg = document.createElement("div");
  userMsg.className = "message user";
  userMsg.innerText = message;
  chatBox.appendChild(userMsg);

  input.value = "";

  // typing dots
  const loading = document.createElement("div");
  loading.className = "message bot typing";
  loading.innerHTML = "<span></span><span></span><span></span>";
  chatBox.appendChild(loading);

  try {
    const res = await fetch("https://ai-travel-chatbot.onrender.com/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message })
    });

    const data = await res.json();

    loading.remove();

    // bot msg
    const botMsg = document.createElement("div");
    botMsg.className = "message bot";
    chatBox.appendChild(botMsg);

    streamText(botMsg, data.reply);

    // image card
    const lowerMsg = message.toLowerCase();

    // 📸 ถ้าขอ "รูป"
if (lowerMsg.includes("image") || lowerMsg.includes("photo") || lowerMsg.includes("รูป")) {

  const place = message.replace(/image|photo|show|รูป/gi, "").trim();

  const card = document.createElement("div");
  card.className = "image-card";

  card.innerHTML = `
    <img src="https://source.unsplash.com/featured/?${place},travel" />
    <div class="card-body">📍 ${place}</div>
  `;

  chatBox.appendChild(card);
  chatBox.scrollTop = chatBox.scrollHeight;
  return;
}

// 🗺️ ถ้าขอ "แผนที่"
if (lowerMsg.includes("map") || lowerMsg.includes("location") || lowerMsg.includes("แผนที่")) {

  const place = message.replace(/map|location|show|แผนที่/gi, "").trim();

  const map = document.createElement("div");
  map.className = "message bot";

  map.innerHTML = `
    📍 ${place}<br>
    <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(place)}" target="_blank">
      Open in Google Maps →
    </a>
  `;

  chatBox.appendChild(map);
  chatBox.scrollTop = chatBox.scrollHeight;
  return;
}

  } catch (error) {
    loading.innerText = "Error connecting to server";
  }
}

// ENTER KEY FIX (สำคัญมาก)
document.getElementById("userInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    e.preventDefault();
    sendMessage();
  }
});

</script>

</body>
</html>
