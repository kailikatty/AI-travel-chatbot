<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ask AI Travel Guide</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1e3a8a, #3b82f6, #60a5fa);
  display: flex;
  justify-content: center;
  align-items: center;
}

.chat-container {
  width: 100%;
  max-width: 480px;
  height: 95dvh;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.15);
  border-radius: 25px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.3);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Mobile */
@media (max-width: 600px) {
  body {
    align-items: stretch; /*/ สำคัญ */
  }
  .chat-container {
    max-width: 100%;
    height: 100dvh;
    border-radius: 0;
  }
}

.header {
  padding: 18px;
  color: white;
  font-weight: bold;
  text-align: center;
  font-size: 18px;
}

.chat-box {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.message {
  max-width: 75%;
  padding: 12px 15px;
  border-radius: 18px;
  font-size: 15px;
  animation: fadeIn 0.5s ease;
  line-height: 1.6;
}

.user {
  align-self: flex-end;
  background: #2563eb;
  color: white;
}

.bot {
  align-self: flex-start;
  background: rgba(255,255,255,0.9);
}

/* typing dots */
.typing {
  display: flex;
  gap: 5px;
}

.typing span {
  width: 8px;
  height: 8px;
  background: #2563eb;
  border-radius: 50%;
  animation: bounce 1.4s infinite;
}

.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
  0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
  40% { transform: translateY(-6px); opacity: 1; }
}

/* image card */
.image-card {
  width: 220px;
  border-radius: 14px;
  overflow: hidden;
  background: white;
  box-shadow: 0 8px 20px rgba(0,0,0,0.15);
}

.image-card img {
  width: 100%;
  display: block;
}

.card-body {
  padding: 10px;
  font-size: 13px;
}

.input-container {
  display: flex;
  padding: 10px;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

button {
  margin-left: 10px;
  padding: 10px 15px;
  border-radius: 10px;
  border: none;
  background: #2563eb;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="chat-container">
  <div class="header">🌍 AI Travel Guide ✈️</div>

  <div class="chat-box" id="chatBox">
    <div class="message bot">
      Hello! I'm your AI travel guide 😊<br>
      Where would you like to explore today?
    </div>
  </div>

  <div class="input-container">
    <input id="userInput" placeholder="Ask about travel..." />
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>

const chatBox = document.getElementById("chatBox");
const input = document.getElementById("userInput");

// ✅ ENTER FIX (สำคัญ)
input.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    e.preventDefault();
    sendMessage();
  }
});

// typing effect
function streamText(element, text) {
  const words = text.split(" ");
  let i = 0;

  function typing() {
    if (i < words.length) {
      let word = words[i];

      word = word
        .replace(/\n/g, "<br>")
        .replace(/\*\*(.*?)\*\*/g, "<b>$1</b>");

      element.innerHTML += word + " ";
      chatBox.scrollTop = chatBox.scrollHeight;

      i++;
      setTimeout(typing, 40);
    }
  }

  typing();
}

// MAIN FUNCTION
async function sendMessage() {
  const message = input.value.trim();
  if (!message) return;

  // user message
  const userMsg = document.createElement("div");
  userMsg.className = "message user";
  userMsg.innerText = message;
  chatBox.appendChild(userMsg);

  input.value = "";

  // loading
  const loading = document.createElement("div");
  loading.className = "message bot typing";
  loading.innerHTML = "<span></span><span></span><span></span>";
  chatBox.appendChild(loading);

  try {
    const res = await fetch("https://ask-ai-guide.onrender.com/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message })
    });

    const data = await res.json();

    loading.remove();

    // bot message
    const botMsg = document.createElement("div");
botMsg.className = "message bot";

    // ✅ ใส่รูปก่อน (ถ้ามี)
    if (data.image_url) {
      botMsg.innerHTML = `
        <img src="${data.image_url}" style="width:100%; border-radius:12px; margin-bottom:8px;" />
      `;
    }

    chatBox.appendChild(botMsg);

    // แล้วค่อยใส่ข้อความ
    streamText(botMsg, data.reply);

    chatBox.scrollTop = chatBox.scrollHeight;

  } catch (error) {
    loading.innerText = "Error connecting to server";
  }
}

</script>

</body>
</html>
