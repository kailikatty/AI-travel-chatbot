<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Travel Chat</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f5f5f5;
}

#chat {
    height: 90vh;
    overflow-y: auto;
    padding: 15px;
}

.message {
    max-width: 70%;
    padding: 10px;
    margin: 8px;
    border-radius: 10px;
}

.user {
    background: #007bff;
    color: white;
    margin-left: auto;
}

.bot {
    background: #e0e0e0;
}

#inputBox {
    position: fixed;
    bottom: 0;
    width: 100%;
    display: flex;
    background: white;
    padding: 10px;
}

#msg {
    flex: 1;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 8px;
}

button {
    margin-left: 10px;
    padding: 10px 15px;
    border: none;
    background: #007bff;
    color: white;
    border-radius: 8px;
}
</style>
</head>

<body>

<div id="chat">
    <div class="message bot">
        Hello, I am your AI travel guide. How may I help you?
    </div>
</div>

<div id="inputBox">
    <input id="msg" placeholder="Ask about travel..." />
    <button onclick="send()">Send</button>
</div>

<script>
async function send() {
    const input = document.getElementById("msg");
    const message = input.value;
    if (!message) return;

    const chat = document.getElementById("chat");

    // User message
    chat.innerHTML += `<div class="message user">${message}</div>`;

    input.value = "";

    // Scroll down
    chat.scrollTop = chat.scrollHeight;

    // Loading
    chat.innerHTML += `<div class="message bot">Typing...</div>`;
    chat.scrollTop = chat.scrollHeight;

    try {
        const res = await fetch("http://127.0.0.1:5000/chat", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ message: message })
        });

        const data = await res.json();

        // remove "Typing..."
        chat.lastChild.remove();

        // Bot reply
        chat.innerHTML += `<div class="message bot">${data.reply}</div>`;
    } catch (err) {
        chat.lastChild.remove();
        chat.innerHTML += `<div class="message bot">Error connecting to server</div>`;
    }

    chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
