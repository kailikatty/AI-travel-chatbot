<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Travel Guide ✈️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to bottom, #e6f2ff, #ffffff);
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      padding: 16px;
      background: #007bff;
      color: white;
      font-weight: 600;
      text-align: center;
      font-size: 18px;
    }

    #chat {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .bubble {
      max-width: 75%;
      padding: 12px 14px;
      border-radius: 16px;
      line-height: 1.4;
      font-size: 14px;
      white-space: pre-line;
    }

    .user {
      align-self: flex-end;
      background: #007bff;
      color: white;
      border-bottom-right-radius: 4px;
    }

    .bot {
      align-self: flex-start;
      background: #f1f1f1;
      color: #333;
      border-bottom-left-radius: 4px;
    }

    .typing {
      font-style: italic;
      color: gray;
      font-size: 13px;
    }

    .input-area {
      display: flex;
      padding: 10px;
      border-top: 1px solid #ddd;
      background: white;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 14px;
      outline: none;
    }

    button {
      margin-left: 10px;
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: #007bff;
      color: white;
      font-weight: 500;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }
  </style>
</head>

<body>

<header>
  🌍 AI Travel Local Guide
</header>

<div id="chat"></div>

<div class="input-area">
  <input id="input" placeholder="Ask me where to go..." />
  <button onclick="sendMessage()">Send</button>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");

// ✅ เพิ่มข้อความต้อนรับ
window.onload = () => {
  addMessage("Hello! I'm your AI travel guide.😊\nWhere would you like to explore today?", "bot");
};

function addMessage(text, sender) {
  const div = document.createElement("div");
  div.classList.add("bubble", sender);
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const div = document.createElement("div");
  div.classList.add("typing");
  div.id = "typing";
  div.innerText = "AI is typing...";
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const typing = document.getElementById("typing");
  if (typing) typing.remove();
}

async function sendMessage() {
  const message = input.value.trim();
  if (!message) return;

  addMessage(message, "user");
  input.value = "";

  showTyping();

  try {
    const res = await fetch("https://ai-travel-chatbot.onrender.com/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message })
    });

    const data = await res.json();

    removeTyping();
    addMessage(data.reply, "bot");

  } catch (err) {
    removeTyping();
    addMessage("Something went wrong 😢", "bot");
  }
}

// ✅ กด Enter ส่งได้เลย
input.addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    sendMessage();
  }
});
</script>

</body>
</html>
